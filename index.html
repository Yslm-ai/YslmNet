<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Koder — Блог о разработке</title>
    <meta name="description" content="Новости и обзоры из мира IT. Что нового на канале?">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'TildaSans', sans-serif;
            background-color: #000000;
            margin: 0;
            scroll-behavior: smooth; /* Плавная прокрутка для всей страницы */
        }

        /* ===== АНИМАЦИИ ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes matrixGlow {
            0% {
                text-shadow: 0 0 2px #14ff00, 0 0 5px #14ff00;
            }
            100% {
                text-shadow: 0 0 8px #14ff00, 0 0 15px #14ff00;
            }
        }

        @keyframes arrowBounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(8px);
            }
        }

        .animate-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.7s ease, transform 0.7s ease;
        }

        .animate-on-scroll.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== HEADER (НАВИГАЦИЯ) ===== */
        .header {
            background-color: #000000;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(20, 255, 0, 0.3);
        }

        .header__container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 48px;
            font-weight: 700;
            color: #14ff00;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            animation: matrixGlow 1.5s ease-in-out infinite alternate;
        }

        .logo:hover {
            transform: scale(1.02);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-link {
            color: #14ff00;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
        }

        .nav-link:hover {
            border-bottom-color: #14ff00;
            transform: translateY(-2px);
        }

        /* ===== ГЛАВНЫЙ БЛОК (HERO) — НОВЫЙ ЦВЕТ ФОНА ===== */
        .hero {
            background: linear-gradient(135deg, #0a0f0a 0%, #051505 50%, #000000 100%);
            position: relative;
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px;
            overflow: hidden;
        }

        /* Анимированный фон с "матрицей" */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('matrix-code.gif');
            background-repeat: repeat;
            opacity: 0.15;
            pointer-events: none;
        }

        .hero__content {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .hero__uptitle {
            color: #14ff00;
            font-size: 14px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .hero__title {
            color: #14ff00;
            font-size: 64px;
            font-weight: 700;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease;
        }

        .hero__descr {
            color: #14ff00;
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        /* КНОПКИ */
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 40px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn--primary {
            background-color: #14ff00;
            color: #000000;
            box-shadow: 0 4px 15px rgba(20, 255, 0, 0.3);
        }

        .btn--primary:hover {
            background-color: #0fcc00;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(20, 255, 0, 0.4);
        }

        .btn--secondary {
            background-color: transparent;
            color: #14ff00;
            border: 2px solid #14ff00;
        }

        .btn--secondary:hover {
            background-color: rgba(20, 255, 0, 0.1);
            transform: translateY(-3px);
        }

        /* СТРЕЛКА ВНИЗ */
        .hero__arrow {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            transition: all 0.3s ease;
            animation: arrowBounce 1.5s infinite;
        }

        .hero__arrow svg {
            fill: #14ff00;
            width: 38px;
            height: 19px;
        }

        /* ===== СЕКЦИЯ С ПОДВАЛОМ (НОВЫЙ ДИЗАЙН) ===== */
        .footer-section {
            background: linear-gradient(180deg, #000000 0%, #0a1a0a 100%);
            padding: 60px 20px 40px;
            text-align: center;
            border-top: 1px solid rgba(20, 255, 0, 0.2);
        }

        .footer-section__content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-title {
            color: #14ff00;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .footer-dino {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .footer-dino img {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 8px #14ff00);
            transition: transform 0.3s ease;
        }

        .footer-dino img:hover {
            transform: scale(1.05);
        }

        /* КЛИКАБЕЛЬНАЯ КНОПКА "НАВЕРХ" */
        .btn-to-top {
            background-color: #14ff00;
            color: #000000;
            border: none;
            padding: 14px 40px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(20, 255, 0, 0.3);
            margin-top: 20px;
        }

        .btn-to-top:hover {
            background-color: #0fcc00;
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 8px 30px rgba(20, 255, 0, 0.5);
        }

        .btn-to-top:active {
            transform: translateY(2px);
        }

        .copyright {
            color: rgba(20, 255, 0, 0.5);
            margin-top: 50px;
            font-size: 14px;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .header__container {
                flex-direction: column;
                text-align: center;
            }
            
            .hero__title {
                font-size: 40px;
            }
            
            .hero__descr {
                font-size: 18px;
            }
            
            .footer-title {
                font-size: 32px;
            }
            
            .btn-to-top {
                font-size: 22px;
                padding: 12px 30px;
            }
            
            .logo {
                font-size: 36px;
            }
        }
        
        @media (max-width: 480px) {
            .nav-links {
                gap: 20px;
            }
            
            .hero__title {
                font-size: 32px;
            }
            
            .btn {
                padding: 10px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

<div id="allrecords">
    <!-- ХЕДЕР -->
    <header class="header">
        <div class="header__container">
            <a href="#" class="logo" id="logoLink">Koder</a>
            <div class="nav-links">
                <a href="#about" class="nav-link">О влоге</a>
                <a href="#reviews" class="nav-link">Отзывы</a>
                <a href="#hero" class="nav-link">Канал</a>
            </div>
        </div>
    </header>

    <!-- ГЛАВНЫЙ БЛОК (HERO) с изменённым фоном и анимацией -->
    <section class="hero" id="hero">
        <div class="hero__content">
            <div class="hero__uptitle animate-on-scroll">Новости за неделю</div>
            <h1 class="hero__title animate-on-scroll">Что нового?</h1>
            <p class="hero__descr animate-on-scroll">Что автор канала опять напридумывал?</p>
            <div class="buttons animate-on-scroll">
                <a href="#about" class="btn btn--primary">О влоге</a>
                <a href="https://t.me/kod_way" target="_blank" class="btn btn--secondary" rel="noopener noreferrer">Telegram</a>
            </div>
        </div>
        <div class="hero__arrow" id="scrollArrow">
            <svg viewBox="0 0 38.417 18.592">
                <path d="M19.208,18.592c-0.241,0-0.483-0.087-0.673-0.261L0.327,1.74c-0.408-0.372-0.438-1.004-0.066-1.413c0.372-0.409,1.004-0.439,1.413-0.066L19.208,16.24L36.743,0.261c0.411-0.372,1.042-0.342,1.413,0.066c0.372,0.408,0.343,1.041-0.065,1.413L19.881,18.332C19.691,18.505,19.449,18.592,19.208,18.592z"></path>
            </svg>
        </div>
    </section>

    <!-- СЕКЦИЯ "О ВЛОГЕ" (якорь) -->
    <div id="about"
         style="background-color: #000000; padding: 60px 20px; text-align: center; border-top: 1px solid rgba(20,255,0,0.2);">
        <div class="animate-on-scroll" style="max-width: 800px; margin: 0 auto;">
            <h2 style="color: #14ff00; font-size: 36px; margin-bottom: 20px;">О блоге Koder</h2>
            <p style="color: #cccccc; font-size: 18px; line-height: 1.6;">Привет! Это блог о современных технологиях,
                разработке и всём, что связано с IT.</p>
        </div>
    </div>

    <div id="reviews"
         style="background-color: #000000; padding: 60px 20px; text-align: center; border-top: 1px solid rgba(20,255,0,0.2);">
        <div class="animate-on-scroll" style="max-width: 800px; margin: 0 auto;">
            <script src="https://forms.yandex.ru/_static/embed.js"></script>
            <iframe src="https://forms.yandex.ru/u/67dd1ba750569024833a544f?iframe=1" frameborder="0"
                    name="ya-form-67dd1ba750569024833a544f" width="650"></iframe>
        </div>
    </div>


    <!-- НИЖНЯЯ СЕКЦИЯ (ТЁМНЫЙ ПОДВАЛ) + КЛИКАБЕЛЬНАЯ КНОПКА НАВЕРХ -->
    <footer class="footer-section" id="contact">
        <div class="footer-section__content">
            <div class="footer-title animate-on-scroll">Тёмный подвал</div>
            <div class="footer-dino animate-on-scroll">
                <!-- Дино-иконка с анимацией -->
                <img src="dino.png" alt="dino icon" style="width: 80px;">
            </div>

            <!-- КЛИКАБЕЛЬНАЯ КНОПКА "НАВЕРХ" с плавной прокруткой и анимацией -->
            <button class="btn-to-top" id="goToTopBtn">
                ↑ Наверх
            </button>
        </div>
    </footer>
</div>

<script>
    (function() {
        // ===== ПЛАВНАЯ ПРОКРУТКА ДЛЯ КНОПКИ "НАВЕРХ" =====
        const topButton = document.getElementById('goToTopBtn');
        if (topButton) {
            topButton.addEventListener('click', function(e) {
                e.preventDefault();
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });
        }

        // ===== СТРЕЛКА ВНИЗ (ПРОКРУТКА К СЕКЦИИ "О ВЛОГЕ") =====
        const arrow = document.getElementById('scrollArrow');
        if (arrow) {
            arrow.addEventListener('click', function() {
                const aboutSection = document.getElementById('about');
                if (aboutSection) {
                    aboutSection.scrollIntoView({ behavior: 'smooth' });
                }
            });
        }

        // ===== ЛОГО ТОЖЕ ВЕДЁТ НАВЕРХ =====
        const logoLink = document.getElementById('logoLink');
        if (logoLink) {
            logoLink.addEventListener('click', function(e) {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // ===== АНИМАЦИЯ ПРИ ПРОКРУТКЕ (появление элементов) =====
        const animatedElements = document.querySelectorAll('.animate-on-scroll');
        
        function checkVisibility() {
            animatedElements.forEach(el => {
                const rect = el.getBoundingClientRect();
                const windowHeight = window.innerHeight;
                if (rect.top < windowHeight - 100) {
                    el.classList.add('visible');
                }
            });
        }
        
        // Запускаем при загрузке и при скролле
        window.addEventListener('load', checkVisibility);
        window.addEventListener('scroll', checkVisibility);
        checkVisibility(); // на всякий случай
        
        // ===== ДОБАВЛЯЕМ ДОПОЛНИТЕЛЬНЫЕ ЭФФЕКТЫ ДЛЯ НАВИГАЦИИ =====
        // Плавная прокрутка для якорных ссылок в меню
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                const targetId = this.getAttribute('href');
                if (targetId && targetId !== '#') {
                    e.preventDefault();
                    const targetElement = document.querySelector(targetId);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        });
        
        // Кнопки "О влоге" в hero-блоке
        const aboutBtn = document.querySelector('.btn--primary');
        if (aboutBtn && aboutBtn.getAttribute('href') === '#about') {
            aboutBtn.addEventListener('click', function(e) {
                e.preventDefault();
                document.getElementById('about').scrollIntoView({ behavior: 'smooth' });
            });
        }
    })();
</script>

<!-- Добавляем поддержку старых браузеров для smooth scroll (полифил не требуется, т.к. современные браузеры поддерживают) -->
</body>
</html>
